name: lexio
description: "English vocabulary learning app with AI-powered word extraction and spaced repetition."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Database
  drift: ^2.20.2
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.25

  # Navigation
  go_router: ^14.3.0

  # HTTP
  dio: ^5.7.0

  # Google Generative AI (Gemini official SDK)
  google_generative_ai: ^0.4.7

  # Secure storage for API keys
  flutter_secure_storage: ^9.2.2

  # CSV import/export
  csv: ^6.0.0
  file_picker: ^8.1.3

  # Utilities
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.2

flutter:
  uses-material-design: true
