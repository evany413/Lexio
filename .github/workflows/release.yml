name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - run: zip -r Lexio-macos.zip build/macos/Build/Products/Release/Lexio.app
      - uses: softprops/action-gh-release@v2
        with:
          files: Lexio-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath Lexio-windows.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: Lexio-windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: sudo apt-get update && sudo apt-get install -y --fix-missing clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - run: zip -r Lexio-linux.zip build/linux/x64/release/bundle/
      - uses: softprops/action-gh-release@v2
        with:
          files: Lexio-linux.zip
